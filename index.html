<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:black;
    font-family:'Rubik', sans-serif;
    color:white;
    overflow-y:auto;
}

/* CENTER CONTAINER */
.container{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
    gap:20px;
}

/* CARD */
.card{
    width:900px;
    height:220px;

    display:flex;
    border-radius:18px;
    overflow:hidden;

    border:2px solid white;
    background:#0a0a0a;

    position:relative;
}

/* LEFT VIDEO */
.left{
    width:35%;
    height:100%;
    position:relative;
}

.left iframe{
    width:100%;
    height:100%;
    border:none;
}

/* RIGHT IMAGE */
.right{
    width:65%;
    position:relative;
}

.right img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* TEXT TOP */
.top{
    position:absolute;
    top:10px;
    left:10px;
    right:10px;

    display:flex;
    justify-content:space-between;
    font-weight:800;
}

/* LEFT TEXT */
.info{
    position:absolute;
    top:10px;
    left:10px;
}

.title{
    font-size:20px;
    font-weight:800;
}

.sub{
    font-size:12px;
    opacity:0.8;
}

/* CHANCE */
.chance{
    position:absolute;
    top:10px;
    right:10px;
    font-weight:800;
}

/* WR */
.wr{
    position:absolute;
    bottom:10px;
    right:10px;

    padding:5px 10px;
    border-radius:12px;

    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.5);

    font-size:12px;
    text-decoration:none;
    color:white;
}

</style>
</head>

<body>

<div class="container" id="container"></div>

<script>

fetch("levels.json")
.then(r=>r.json())
.then(data=>{

    const container = document.getElementById("container");

    data.sort((a,b)=>a.place-b.place);

    data.forEach(l=>{

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
        
        <div class="left">
            <iframe src="https://www.youtube.com/embed/${l.youtube}" allowfullscreen></iframe>
        </div>

        <div class="right">
            <img src="${l.gif}">
        </div>

        <div class="info">
            <div class="title">#${l.place} ${l.name}</div>
            <div class="sub">by ${l.author} • id:${l.id}</div>
        </div>

        <div class="chance">${l.chance}</div>

        <a class="wr" href="${l.wrLink}" target="_blank">
            ${l.wrName}
        </a>

        `;

        container.appendChild(card);

    });

});

</script>

</body>
</html>
