```html
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#000;
    color:white;
    font-family:'Rubik',sans-serif;
    overflow-x:hidden;
}

/* NAVBAR */

.navbar{
    position:sticky;
    top:0;
    z-index:1000;

    width:100%;
    padding:15px 25px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(0,0,0,0.9);
    backdrop-filter:blur(12px);

    border-bottom:2px solid white;
}

.logo{
    font-size:28px;
    font-weight:800;
}

.right-nav{
    display:flex;
    gap:12px;
    align-items:center;
}

#searchBar{
    width:260px;
    max-width:40vw;

    padding:10px 14px;

    border:none;
    outline:none;

    border-radius:12px;

    background:#111;
    color:white;

    font-family:'Rubik',sans-serif;
}

#searchBar::placeholder{
    color:#aaa;
}

.discord{
    width:45px;
    height:45px;

    border-radius:12px;

    background:#5865F2;

    display:flex;
    align-items:center;
    justify-content:center;

    text-decoration:none;
    color:white;

    transition:.2s;
}

.discord:hover{
    transform:scale(1.08);
}

.discord svg{
    width:24px;
    height:24px;
}

/* CONTAINER */

.container{
    width:100%;
    padding:20px;

    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
}

/* CARD */

.card{
    width:min(950px,95vw);
    height:220px;

    display:flex;

    overflow:hidden;
    border-radius:18px;

    border:2px solid white;
    background:#090909;

    position:relative;

    transition:.25s;
}

.card:hover{
    transform:translateY(-3px);
}

.left{
    width:35%;
    height:100%;
}

.left img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.right{
    width:65%;
    height:100%;
}

.right img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* INFO */

.info{
    position:absolute;
    left:12px;
    top:12px;
}

.title{
    font-size:22px;
    font-weight:800;
}

.sub{
    font-size:13px;
    opacity:.95;
    margin-top:3px;
}

/* CHANCE */

.chance{
    position:absolute;
    top:12px;
    right:12px;

    font-size:15px;
    font-weight:800;
}

/* WR BUTTON */

.wr{
    position:absolute;

    right:12px;
    bottom:12px;

    padding:7px 14px;

    border-radius:12px;

    background:rgba(255,255,255,.15);

    border:1px solid rgba(255,255,255,.5);

    text-decoration:none;
    color:white;

    transition:.2s;
}

.wr:hover{
    background:rgba(255,255,255,.25);
}

/* OUTLINE */

.title,
.sub,
.chance,
.wr{
    text-shadow:
    -1px -1px 0 #000,
     1px -1px 0 #000,
    -1px  1px 0 #000,
     1px  1px 0 #000;
}

/* MOBILE */

@media(max-width:768px){

    .navbar{
        flex-direction:column;
        gap:12px;
    }

    #searchBar{
        width:220px;
        max-width:80vw;
    }

    .card{
        height:190px;
    }

    .title{
        font-size:17px;
    }
}

</style>
</head>

<body>

<div class="navbar">

    <div class="logo">
        Luck Based Level List
    </div>

    <div class="right-nav">

        <input
        type="text"
        id="searchBar"
        placeholder="Search level...">

        <a
        class="discord"
        href="YOUR_DISCORD_LINK"
        target="_blank">

            <svg viewBox="0 0 127.14 96.36">
                <path fill="currentColor"
                d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36a77.7,77.7,0,0,0,6.89-11.13,68.42,68.42,0,0,1-10.84-5.18c.91-.66,1.8-1.34,2.66-2.06A75.57,75.57,0,0,0,95.71,78c.87.72,1.76,1.4,2.67,2.06a68.68,68.68,0,0,1-10.86,5.19,77,77,0,0,0,6.89,11.12A105.25,105.25,0,0,0,126.58,80.2C129.22,52.84,122.07,29.11,107.7,8.07Z"/>
            </svg>

        </a>

    </div>

</div>

<div class="container" id="container"></div>

<script>

let levelsData = [];

const container = document.getElementById("container");
const searchBar = document.getElementById("searchBar");

function renderLevels(levels){

    container.innerHTML = "";

    levels.forEach(l=>{

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `

        <div class="left">
            <img src="https://img.youtube.com/vi/${l.youtube}/hqdefault.jpg">
        </div>

        <div class="right">
            <img src="${l.gif}" loading="lazy">
        </div>

        <div class="info">
            <div class="title">#${l.place} ${l.name}</div>
            <div class="sub">
                by ${l.author}<br>
                id: ${l.id}
            </div>
        </div>

        <div class="chance">
            ${l.chance}
        </div>

        <a
        class="wr"
        href="${l.wrLink}"
        target="_blank">
            ${l.wrName}
        </a>

        `;

        container.appendChild(card);

    });

}

fetch("levels.json")
.then(r=>r.json())
.then(data=>{

    levelsData = data.sort((a,b)=>a.place-b.place);

    renderLevels(levelsData);

});

searchBar.addEventListener("input",()=>{

    const value = searchBar.value.toLowerCase();

    const filtered = levelsData.filter(level =>

        level.name.toLowerCase().includes(value) ||
        level.author.toLowerCase().includes(value) ||
        String(level.id).includes(value)

    );

    renderLevels(filtered);

});

</script>

</body>
</html>
