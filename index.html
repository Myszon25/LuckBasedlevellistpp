<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
    font-family:'Rubik', sans-serif;
}

.box{
    width:100%;
    height:100dvh;

    border-radius:20px;
    overflow:hidden;

    border:2px solid white;

    display:flex;
    position:relative;
}

/* LEFT */

.left{
    width:33.33%;
    height:100%;
}

.left iframe{
    width:100%;
    height:100%;
    border:none;
    display:block;
}

/* RIGHT */

.right{
    width:66.66%;
    height:100%;
    position:relative;
}

.right img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* HUD */

.hud{
    position:absolute;

    top:12px;
    left:12px;
    right:12px;

    z-index:10;

    display:flex;
    justify-content:space-between;
    align-items:flex-start;

    gap:10px;

    min-width:0;
}

/* LEFT HUD */

.hud-left{
    flex:1;
    min-width:0;
}

/* TITLE */

.label{
    font-size:clamp(12px, 2.6vw, 34px);

    font-weight:800;
    color:white;

    text-shadow:0 0 10px rgba(0,0,0,1);

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

/* SUBTEXT */

.sub{
    margin-top:2px;

    font-size:clamp(9px, 1.7vw, 16px);

    color:rgba(255,255,255,0.9);

    text-shadow:0 0 8px rgba(0,0,0,1);

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

/* ID */

.id{
    font-size:clamp(8px, 1.2vw, 12px);

    color:rgba(255,255,255,0.6);
}

/* FPS */

.fps{
    font-size:clamp(10px, 2.2vw, 26px);

    font-weight:800;
    color:white;

    text-shadow:0 0 10px rgba(0,0,0,1);

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;

    flex-shrink:1;
    min-width:0;
}

/* WR */

.wr-bottom{
    position:absolute;

    right:12px;
    bottom:12px;

    padding:4px 10px;

    border-radius:12px;

    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.6);

    font-size:clamp(8px, 1.5vw, 16px);

    font-weight:600;
    color:white;

    text-decoration:none;

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;

    max-width:40%;
}

/* MOBILE */

@media (max-width:768px){

    .label{
        font-size:clamp(10px, 3vw, 18px);
    }

    .sub{
        font-size:clamp(8px, 2vw, 11px);
    }

    .id{
        font-size:clamp(7px, 1.5vw, 9px);
    }

    .fps{
        font-size:clamp(9px, 2.5vw, 14px);
    }

    .wr-bottom{
        font-size:clamp(7px, 1.7vw, 10px);
        padding:3px 6px;
    }

}

</style>
</head>
<body>

<div class="box">

    <!-- YOUTUBE -->

    <div class="left">
        <iframe
            src="https://www.youtube.com/embed/JVz5peyIRZg"
            allowfullscreen>
        </iframe>
    </div>

    <!-- RIGHT -->

    <div class="right">

        <div class="hud">

            <div class="hud-left">

                <div class="label">
                    #2 No time
                </div>

                <div class="sub">
                    by Myszon12
                    <br>
                    <span class="id">id:141722650</span>
                </div>

            </div>

            <div class="fps">
                Chance: 1/10^10^10^10
            </div>

        </div>

        <img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExOGs1dWJxemIxc3oxNzdramZ6MzdvN293YTY4enN1YWdpbGhnZzhmNiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/t91mTmPcbiQ54Bb81g/giphy.gif">

        <a class="wr-bottom" href="https://example.com" target="_blank">
            wr: none
        </a>

    </div>

</div>

</body>
</html>
